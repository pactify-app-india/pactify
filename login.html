<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f4f4f4;
      font-family: Arial, sans-serif;
    }
    .login-box {
      width: 100%;
      max-width: 360px;
      background: #fff;
      padding: 28px 24px;
      border-radius: 10px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.1);
    }
    h2 { text-align: center; margin-bottom: 20px; font-size: 1.4rem; }
    label { display: block; font-size: 13px; margin-bottom: 4px; color: #555; }
    input {
      width: 100%; padding: 11px 12px;
      margin-bottom: 14px;
      border: 1px solid #ccc; border-radius: 6px;
      font-size: 14px;
    }
    input:focus { outline: 2px solid #007bff; border-color: transparent; }
    button {
      width: 100%; padding: 12px;
      background: #007bff; color: #fff;
      border: none; border-radius: 6px;
      font-size: 15px; cursor: pointer;
    }
    button:hover { background: #0056b3; }
    button:disabled { background: #7aaedf; cursor: not-allowed; }
    #errorMsg {
      display: none;
      color: #c0392b;
      background: #fdecea;
      border: 1px solid #f5c6c6;
      border-radius: 6px;
      padding: 9px 12px;
      font-size: 13px;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h2>Login</h2>
    <form id="loginForm" novalidate>
      <label for="username">Username</label>
      <input type="text" id="username" placeholder="Enter username" autocomplete="username" required />

      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter password" autocomplete="current-password" required />

      <div id="errorMsg" role="alert"></div>

      <button type="submit" id="submitBtn">Login</button>
    </form>
  </div>

  <!-- Load order matters: config first, then auth, then page logic -->
  <script src="./js/config.js"></script>
  <script src="./js/auth.js"></script>
  <script src="./js/login.js"></script>
</body>
</html>
